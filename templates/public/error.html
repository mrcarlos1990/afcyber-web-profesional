{% extends "public/base.html" %}
{% block content %}
<main class="hero-section error-page">
  <canvas id="networkCanvas" aria-hidden="true"></canvas>
  <div class="hero-noise"></div>
  <div class="container position-relative">
    <div class="row align-items-center min-vh-100">
      <div class="col-lg-8" data-aos="fade-up">
        <span class="eyebrow"><i class="fa-solid fa-triangle-exclamation"></i> {{ code }}</span>
        <h1>{{ title }}</h1>
        <p class="hero-subtitle">La solicitud no pudo completarse. Puedes volver al inicio o contactar a AFCyber SOLUTIONS para asistencia.</p>
        <div class="hero-actions">
          <a class="btn btn-primary-premium" href="{{ url_for('index') }}">Volver al inicio</a>
          <a class="btn btn-glass js-whatsapp" href="#"><i class="fa-brands fa-whatsapp"></i> Contactar soporte</a>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock %}
