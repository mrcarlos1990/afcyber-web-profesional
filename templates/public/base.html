<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ settings.meta_title }}</title>
  <meta name="description" content="{{ settings.meta_description }}">
  <meta name="keywords" content="{{ settings.meta_keywords }}">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="{{ settings.background_color }}">
  {% if settings.google_search_console %}<meta name="google-site-verification" content="{{ settings.google_search_console }}">{% endif %}
  <link rel="canonical" href="{{ request.url_root.rstrip('/') }}/">
  <meta property="og:title" content="{{ settings.meta_title }}">
  <meta property="og:description" content="{{ settings.meta_description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.url_root.rstrip('/') }}/">
  <meta property="og:site_name" content="{{ settings.company_name }}">
  {% if settings.og_image %}<meta property="og:image" content="{{ settings.og_image|asset }}">{% endif %}
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ settings.meta_title }}">
  <meta name="twitter:description" content="{{ settings.meta_description }}">
  {% if settings.og_image %}<meta name="twitter:image" content="{{ settings.og_image|asset }}">{% endif %}
  {% if settings.favicon %}<link rel="icon" href="{{ settings.favicon|asset }}">{% else %}<link rel="icon" href="{{ url_for('static', filename='img/og-afcyber.svg') }}" type="image/svg+xml">{% endif %}
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/platform.css') }}" rel="stylesheet">
  <style>
    :root {
      --primary: {{ settings.primary_color }};
      --secondary: {{ settings.secondary_color }};
      --page-bg: {{ settings.background_color }};
      --button: {{ settings.button_color }};
      --text: {{ settings.text_color }};
    }
  </style>
  {% if settings.google_analytics_id %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ settings.google_analytics_id }}"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','{{ settings.google_analytics_id }}');</script>
  {% endif %}
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": {{ settings.company_name|tojson }},
      "description": {{ settings.meta_description|tojson }},
      "email": {{ settings.main_email|tojson }},
      "telephone": {{ settings.phone|tojson }},
      "address": {{ settings.address|tojson }},
      "url": {{ (request.url_root.rstrip('/') ~ '/')|tojson }}
    }
  </script>
</head>
<body class="{% if settings.dark_mode %}dark-site{% endif %}">
  <a class="skip-link" href="#contenido">Saltar al contenido</a>
  {% block content %}{% endblock %}
  <script>
    window.AFCYBER = {
      whatsapp: "{{ settings.whatsapp }}",
      csrf: "{{ csrf_token }}"
    };
    document.querySelectorAll('form[method="post"], form[method="POST"]').forEach((form) => {
      if (!form.querySelector('input[name="_csrf_token"]')) {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = "_csrf_token";
        input.value = window.AFCYBER.csrf;
        form.prepend(input);
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/platform.js') }}"></script>
</body>
</html>
