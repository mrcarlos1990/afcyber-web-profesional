{% extends "admin/base.html" %}
{% block content %}
<div class="admin-header"><h1>Planes y precios</h1><p>Gestiona planes SaaS visuales.</p></div>
<form class="admin-card mini-form" method="post">
  <input class="form-control" name="name" placeholder="Nombre" required>
  <input class="form-control" name="price" placeholder="Precio">
  <input class="form-control" name="button_text" placeholder="Texto boton">
  <input class="form-control" type="number" name="position" placeholder="Orden">
  <textarea class="form-control" name="description" placeholder="Descripcion" required></textarea>
  <textarea class="form-control" name="features" placeholder="Caracteristicas, una por linea" required></textarea>
  <label class="check"><input type="checkbox" name="is_featured"> Destacado</label>
  <label class="check"><input type="checkbox" name="is_active" checked> Activo</label>
  <button class="btn btn-primary">Crear plan</button>
</form>
{% for item in items %}
<form class="admin-card edit-row" method="post" action="{{ url_for('update_plan', item_id=item.id) }}">
  <input class="form-control" name="name" value="{{ item.name }}" required>
  <input class="form-control" name="price" value="{{ item.price }}">
  <input class="form-control" name="button_text" value="{{ item.button_text }}">
  <input class="form-control" type="number" name="position" value="{{ item.position }}">
  <textarea class="form-control" name="description" required>{{ item.description }}</textarea>
  <textarea class="form-control" name="features" required>{{ item.features }}</textarea>
  <label class="check"><input type="checkbox" name="is_featured" {% if item.is_featured %}checked{% endif %}> Destacado</label>
  <label class="check"><input type="checkbox" name="is_active" {% if item.is_active %}checked{% endif %}> Activo</label>
  <button class="btn btn-primary">Guardar</button>
  <button class="btn btn-outline-danger" formaction="{{ url_for('delete_plan', item_id=item.id) }}">Eliminar</button>
</form>
{% endfor %}
{% endblock %}
