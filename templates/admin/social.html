{% extends "admin/base.html" %}
{% block content %}
<div class="admin-header"><h1>Redes sociales</h1><p>Enlaces adicionales mostrados en la web.</p></div>
<form class="admin-card mini-form" method="post">
  <input class="form-control" name="name" placeholder="Nombre" required>
  <input class="form-control" name="icon" placeholder="fa-brands fa-linkedin-in">
  <input class="form-control" name="url" placeholder="URL" required>
  <input class="form-control" type="number" name="position" placeholder="Orden">
  <label class="check"><input type="checkbox" name="is_active" checked> Activo</label>
  <button class="btn btn-primary">Crear red</button>
</form>
{% for item in items %}
<form class="admin-card edit-row" method="post" action="{{ url_for('update_social', item_id=item.id) }}">
  <input class="form-control" name="name" value="{{ item.name }}" required>
  <input class="form-control" name="icon" value="{{ item.icon }}">
  <input class="form-control" name="url" value="{{ item.url }}" required>
  <input class="form-control" type="number" name="position" value="{{ item.position }}">
  <label class="check"><input type="checkbox" name="is_active" {% if item.is_active %}checked{% endif %}> Activo</label>
  <button class="btn btn-primary">Guardar</button>
  <button class="btn btn-outline-danger" formaction="{{ url_for('delete_social', item_id=item.id) }}">Eliminar</button>
</form>
{% endfor %}
{% endblock %}
