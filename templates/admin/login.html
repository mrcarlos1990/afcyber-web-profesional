<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | AFCyber SOLUTIONS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/admin.css') }}" rel="stylesheet">
</head>
<body class="login-body">
  <main class="login-card">
    <div class="admin-brand justify-content-center"><span>AF</span><strong>AFCyber SOLUTIONS</strong></div>
    <h1>Panel administrativo</h1>
    <p>Gestiona contenido, imágenes, mensajes, SEO y usuarios.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}
    {% endwith %}
    <form method="post">
      <label>Correo<input class="form-control" type="email" name="email" required value="admin@afcybersolutions.com.do"></label>
      <label>Contrasena<input class="form-control" type="password" name="password" required></label>
      <button class="btn btn-admin w-100" type="submit">Iniciar sesion</button>
    </form>
  </main>
</body>
</html>
