<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Admin | AFCyber SOLUTIONS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/admin.css') }}" rel="stylesheet">
</head>
<body class="login-body">
  <form class="login-card" method="post">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
    <span class="login-mark">AF</span>
    <h1>Panel administrativo</h1>
    <p>Gestiona contenido, mensajes, SEO, servicios, CEO y portafolio.</p>
    {% include "public/partials/flash.html" %}
    <input class="form-control" type="email" name="email" placeholder="admin@afcybersolutions.com.do" required>
    <input class="form-control" type="password" name="password" placeholder="Contraseña" required>
    <button class="btn btn-primary w-100">Iniciar sesion</button>
  </form>
</body>
</html>
