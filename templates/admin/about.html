{% extends "admin/base.html" %}
{% block content %}
<div class="admin-header"><h1>Nosotros</h1><p>Historia, mision, vision, valores y experiencia.</p></div>
<form class="admin-card stacked-form" method="post" enctype="multipart/form-data">
  {% for field,label in [('history','Historia'),('mission','Mision'),('vision','Vision'),('values','Valores'),('experience','Experiencia')] %}
    <label>{{ label }}<textarea class="form-control" name="{{ field }}">{{ item|attr(field) }}</textarea></label>
  {% endfor %}
  <label>Imagen corporativa<input class="form-control image-input" type="file" name="image" accept=".jpg,.jpeg,.png,.webp,.svg"><img class="preview wide" src="{% if item.image %}{{ item.image|asset }}{% endif %}"></label>
  <button class="btn btn-primary">Guardar nosotros</button>
</form>
{% endblock %}
