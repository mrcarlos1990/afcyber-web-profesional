<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin | {{ settings.company_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/admin.css') }}" rel="stylesheet">
</head>
<body>
  <aside class="admin-sidebar">
    <a class="admin-brand" href="{{ url_for('admin_dashboard') }}"><span>AF</span>AFCyber Admin</a>
    <nav>
      <a href="{{ url_for('admin_dashboard') }}"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
      <a href="{{ url_for('admin_settings') }}"><i class="fa-solid fa-sliders"></i>Configuracion</a>
      <a href="{{ url_for('admin_hero') }}"><i class="fa-solid fa-wand-magic-sparkles"></i>Hero</a>
      <a href="{{ url_for('admin_about') }}"><i class="fa-solid fa-building-shield"></i>Nosotros</a>
      <a href="{{ url_for('admin_ceo') }}"><i class="fa-solid fa-user-tie"></i>CEO/Fundador</a>
      <a href="{{ url_for('admin_services') }}"><i class="fa-solid fa-layer-group"></i>Servicios</a>
      <a href="{{ url_for('admin_plans') }}"><i class="fa-solid fa-tags"></i>Planes</a>
      <a href="{{ url_for('admin_portfolio') }}"><i class="fa-solid fa-briefcase"></i>Portafolio</a>
      <a href="{{ url_for('admin_testimonials') }}"><i class="fa-solid fa-star"></i>Testimonios</a>
      <a href="{{ url_for('admin_faq') }}"><i class="fa-solid fa-circle-question"></i>FAQ</a>
      <a href="{{ url_for('admin_social') }}"><i class="fa-solid fa-share-nodes"></i>Redes</a>
      <a href="{{ url_for('admin_messages') }}"><i class="fa-solid fa-inbox"></i>Mensajes</a>
      <a href="{{ url_for('admin_users') }}"><i class="fa-solid fa-users-gear"></i>Usuarios</a>
      <a href="{{ url_for('index') }}" target="_blank"><i class="fa-solid fa-eye"></i>Ver web</a>
      <a href="{{ url_for('admin_logout') }}"><i class="fa-solid fa-right-from-bracket"></i>Salir</a>
    </nav>
  </aside>
  <main class="admin-main">
    {% include "public/partials/flash.html" %}
    {% block content %}{% endblock %}
  </main>
  <script>
    window.CSRF_TOKEN = "{{ csrf_token }}";
    document.querySelectorAll('form[method="post"], form[method="POST"]').forEach((form) => {
      if (!form.querySelector('input[name="_csrf_token"]')) {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = "_csrf_token";
        input.value = window.CSRF_TOKEN;
        form.prepend(input);
      }
    });
  </script>
  <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
